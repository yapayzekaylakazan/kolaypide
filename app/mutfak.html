<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KolayPide — Mutfak</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#0a0a0a;--bg2:#111;--surface:#1a1a1a;--surface2:#222;--border:#2a2a2a;--text:#f0f0f0;--muted:#666;--accent:#f0b940;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--orange:#f97316;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes slideIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    @keyframes bildirimIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}

    /* GİRİŞ */
    #giris{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
    .giris-kart{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:36px;width:100%;max-width:380px;text-align:center;}
    .giris-kart h1{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--accent);margin-bottom:6px;}
    .giris-kart p{color:var(--muted);font-size:.85rem;font-weight:600;margin-bottom:22px;}
    .inp{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:700;outline:none;margin-bottom:12px;transition:border-color .2s;}
    .inp:focus{border-color:var(--accent);}
    .btn-giris{width:100%;padding:13px;border-radius:12px;border:none;background:var(--accent);color:#1a0f00;font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;cursor:pointer;}
    .btn-giris:hover{opacity:.85;}
    .err{color:var(--red);font-size:.8rem;font-weight:700;margin-top:8px;display:none;}

    /* HEADER */
    #ana{display:none;}
    .header{background:var(--bg2);border-bottom:2px solid var(--accent);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
    .header-logo{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:900;color:var(--accent);}
    .saat{font-family:monospace;font-size:1.1rem;font-weight:900;letter-spacing:2px;}
    .online{width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);animation:pulse 2s infinite;}
    .ses-btn{padding:6px 12px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:'Nunito',sans-serif;font-weight:800;font-size:.75rem;cursor:pointer;}
    .ses-btn.on{border-color:var(--green);color:var(--green);}

    /* TOOLBAR */
    .toolbar{padding:10px 20px;display:flex;align-items:center;gap:10px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap;}
    .f-btn{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:'Nunito',sans-serif;font-weight:800;font-size:.75rem;cursor:pointer;transition:all .2s;}
    .f-btn.ak{background:var(--accent);color:#1a0f00;border-color:var(--accent);}
    .sayaclar{margin-left:auto;display:flex;gap:10px;}
    .sc{padding:3px 10px;border-radius:16px;font-size:.75rem;font-weight:900;}
    .sc-b{background:#f9731622;color:var(--orange);}
    .sc-h{background:#3b82f622;color:var(--blue);}
    .sc-ok{background:#22c55e22;color:var(--green);}

    /* GRID */
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;padding:18px 20px;}

    /* KART */
    .kart{background:var(--bg2);border:2px solid var(--border);border-radius:16px;overflow:hidden;animation:slideIn .35s ease;transition:border-color .3s;}
    .kart.bekliyor{border-color:var(--orange);}
    .kart.hazirlaniyor{border-color:var(--blue);}
    .kart.hazir{border-color:var(--green);opacity:.75;}
    .kh{padding:11px 14px;display:flex;align-items:center;justify-content:space-between;}
    .kh.bekliyor{background:#f9731612;}
    .kh.hazirlaniyor{background:#3b82f612;}
    .kh.hazir{background:#22c55e12;}
    .masa-no{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:900;}
    .masa-no.bekliyor{color:var(--orange);}
    .masa-no.hazirlaniyor{color:var(--blue);}
    .masa-no.hazir{color:var(--green);}
    .durum-lbl{font-size:.68rem;font-weight:900;text-transform:uppercase;letter-spacing:.5px;}
    .durum-lbl.bekliyor{color:var(--orange);}
    .durum-lbl.hazirlaniyor{color:var(--blue);}
    .durum-lbl.hazir{color:var(--green);}
    .sure{font-size:.72rem;font-weight:900;padding:3px 9px;border-radius:9px;font-family:monospace;}
    .sure.bekliyor{background:#f9731622;color:var(--orange);}
    .sure.hazirlaniyor{background:#3b82f622;color:var(--blue);}
    .sure.hazir{background:#22c55e22;color:var(--green);}
    .urunler{padding:10px 14px;}
    .urun{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:.88rem;}
    .urun:last-child{border:none;}
    .urun-sol{display:flex;align-items:center;gap:7px;font-weight:700;}
    .adet{background:var(--surface2);border-radius:7px;padding:2px 7px;font-size:.75rem;font-weight:900;color:var(--accent);}
    .not{margin:0 14px 10px;background:var(--surface);border-radius:8px;padding:7px 10px;font-size:.76rem;color:var(--accent);font-weight:700;}
    .aksiyonlar{display:flex;gap:7px;padding:10px 14px;border-top:1px solid var(--border);}
    .ak-btn{flex:1;padding:9px;border-radius:10px;border:none;font-family:'Nunito',sans-serif;font-weight:900;font-size:.78rem;cursor:pointer;transition:opacity .2s;}
    .ak-btn:hover{opacity:.8;}
    .btn-hazirla{background:#3b82f618;color:var(--blue);border:1.5px solid var(--blue);}
    .btn-tamam{background:var(--green);color:#0a0a0a;}
    .btn-iptal{background:#ef444418;color:var(--red);border:1.5px solid var(--red);}

    /* VARYANT ÖZET */
    .varyant-ozet{display:flex;flex-wrap:wrap;gap:4px;margin-top:3px;}
    .varyant-pill{background:#f0b94018;color:var(--accent);border:1px solid #f0b94040;border-radius:6px;padding:1px 7px;font-size:.68rem;font-weight:800;}
    .urun-sol{flex-direction:column;align-items:flex-start!important;}
    .urun-sol-ust{display:flex;align-items:center;gap:7px;}

    /* KART TIKLANABILIR */
    .kart{cursor:pointer;}
    .kart:hover{filter:brightness(1.06);}
    .kart .aksiyonlar button{cursor:pointer;}

    /* DETAY MODALİ */
    .detay-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:flex-end;justify-content:center;padding:0 0 0 0;}
    .detay-panel{background:var(--bg2);border-radius:22px 22px 0 0;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding:0 0 32px 0;animation:slideIn .28s ease;}
    .detay-handle{width:40px;height:4px;background:var(--border);border-radius:4px;margin:12px auto 0;}
    .detay-header{padding:16px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
    .detay-masa{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:900;}
    .detay-kapat{background:var(--surface2);border:none;color:var(--text);width:32px;height:32px;border-radius:50%;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .detay-meta{padding:10px 18px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--border);}
    .detay-badge{padding:3px 10px;border-radius:10px;font-size:.72rem;font-weight:900;}
    .detay-urunler{padding:12px 18px;}
    .detay-urun-baslik{font-size:.7rem;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
    .detay-urun-satir{background:var(--surface);border-radius:10px;padding:10px 12px;margin-bottom:7px;}
    .detay-urun-ust{display:flex;align-items:center;justify-content:space-between;}
    .detay-urun-isim{font-weight:800;font-size:.92rem;display:flex;align-items:center;gap:6px;}
    .detay-urun-fiyat{font-weight:900;font-size:.85rem;color:var(--accent);}
    .detay-urun-varyantlar{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
    .detay-urun-pill{background:#f0b94015;color:var(--accent);border:1px solid #f0b94035;border-radius:6px;padding:2px 8px;font-size:.72rem;font-weight:800;}
    .detay-not{margin:0 18px 12px;background:var(--surface);border-radius:10px;padding:9px 12px;font-size:.8rem;color:var(--accent);font-weight:700;}
    .detay-aksiyonlar{padding:0 18px;display:flex;gap:8px;}
    .detay-akbtn{flex:1;padding:11px;border-radius:11px;border:none;font-family:'Nunito',sans-serif;font-weight:900;font-size:.82rem;cursor:pointer;}

    /* BOŞ */
    .bos{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px;text-align:center;color:var(--muted);grid-column:1/-1;}
    .bos .ikon{font-size:3.5rem;margin-bottom:14px;opacity:.35;}

    /* YOLA ÇIKANLAR */
    .gecmis-bolum{padding:0 20px 30px;}
    .gecmis-baslik{display:flex;align-items:center;justify-content:space-between;padding:16px 0 10px;border-top:2px solid var(--border);margin-top:8px;}
    .gecmis-baslik h3{font-size:.85rem;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
    .tarih-sec{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
    .tarih-btn{padding:4px 12px;border-radius:16px;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);font-family:'Nunito',sans-serif;font-weight:800;font-size:.72rem;cursor:pointer;transition:all .2s;}
    .tarih-btn.ak{background:#22c55e22;color:var(--green);border-color:var(--green);}
    input[type=date].tarih-inp{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:4px 10px;color:var(--text);font-family:'Nunito',sans-serif;font-size:.75rem;font-weight:700;outline:none;cursor:pointer;}
    input[type=date].tarih-inp:focus{border-color:var(--accent);}
    .gecmis-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;margin-top:10px;}
    .gecmis-kart{background:var(--bg2);border:1.5px solid #22c55e44;border-radius:12px;padding:12px 14px;}
    .gecmis-kart-baslik{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
    .gecmis-masa{font-weight:900;font-size:.9rem;color:var(--green);}
    .gecmis-saat{font-size:.72rem;color:var(--muted);font-weight:700;}
    .gecmis-urun{font-size:.78rem;color:var(--text);font-weight:600;line-height:1.5;}
    .gecmis-toplam{margin-top:6px;font-size:.82rem;font-weight:900;color:var(--accent);text-align:right;}
    .gecmis-bos{text-align:center;color:var(--muted);padding:30px;font-size:.85rem;font-weight:600;grid-column:1/-1;}

    /* TOAST / BİLDİRİM */
    .toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--surface2);color:var(--text);padding:10px 22px;border-radius:12px;font-weight:800;font-size:.85rem;z-index:9999;animation:toastIn .3s ease;border:1px solid var(--border);}
    .bildirim{position:fixed;top:76px;right:20px;background:var(--orange);color:#1a0f00;padding:12px 18px;border-radius:13px;font-weight:900;font-size:.9rem;z-index:9998;animation:bildirimIn .35s ease;box-shadow:0 6px 20px rgba(249,115,22,.4);}

    /* BOTTOM NAV */
    .mutfak-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:2px solid var(--border);display:flex;align-items:center;justify-content:space-around;padding:6px 0 8px;z-index:200;}
    .mutfak-nav a{display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted);font-size:0.62rem;font-weight:800;font-family:'Nunito',sans-serif;text-decoration:none;padding:4px 12px;border-radius:10px;transition:color .15s;}
    .mutfak-nav a.aktif{color:var(--accent);}
    .mutfak-nav a .nv-icon{font-size:1.3rem;line-height:1;}
    .mutfak-nav a .nv-label{margin-top:1px;}
    #ana{padding-bottom:72px;}
  </style>
</head>
<body>

<!-- GİRİŞ -->
<div id="giris">
  <div class="giris-kart">
    <div style="font-size:2.2rem;margin-bottom:10px;">👨‍🍳</div>
    <h1>Mutfak Ekranı</h1>
    <p>Restoran kodunuzu girin</p>
    <input class="inp" id="kode" type="text" placeholder="Restoran kodu..." autocomplete="off">
    <button class="btn-giris" onclick="mutfakGiris()">Mutfak Ekranını Aç →</button>
    <div class="err" id="err"></div>
  </div>
</div>

<!-- ANA EKRAN -->
<div id="ana">
  <div class="header">
    <div class="header-logo">🍳 Mutfak — <span id="h-kafe"></span></div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="saat" id="saat"></div>
      <button class="ses-btn on" id="ses-btn" onclick="sesToggle()">🔔 Ses</button>
      <div class="online"></div>
    </div>
  </div>
  <div class="toolbar">
    <span style="font-size:.72rem;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:1px;">Filtrele:</span>
    <button class="f-btn ak" onclick="filtrele('hepsi',this)">Tümü</button>
    <button class="f-btn" onclick="filtrele('bekliyor',this)">⏳ Bekliyor</button>
    <button class="f-btn" onclick="filtrele('hazirlaniyor',this)">👨‍🍳 Hazırlanıyor</button>
    <button class="f-btn" onclick="filtrele('hazir',this)">✅ Hazır</button>
    <div class="sayaclar">
      <span class="sc sc-b" id="sc-b">⏳ 0</span>
      <span class="sc sc-h" id="sc-h">👨‍🍳 0</span>
      <span class="sc sc-ok" id="sc-ok">✅ 0</span>
    </div>
  </div>
  <div class="grid" id="grid"></div>

  <!-- DETAY MODALİ -->
  <div class="detay-overlay" id="detay-overlay" style="display:none;" onclick="if(event.target===this)detayKapat()">
    <div class="detay-panel" id="detay-panel">
      <div class="detay-handle"></div>
      <div class="detay-header">
        <div>
          <div class="detay-masa" id="detay-masa-adi"></div>
          <div style="font-size:.75rem;color:var(--muted);font-weight:700;margin-top:2px;" id="detay-alt"></div>
        </div>
        <button class="detay-kapat" onclick="detayKapat()">✕</button>
      </div>
      <div class="detay-meta" id="detay-meta"></div>
      <div class="detay-urunler" id="detay-urunler"></div>
      <div id="detay-not-wrap"></div>
      <div class="detay-aksiyonlar" id="detay-aksiyonlar"></div>
    </div>
  </div>

  <!-- YOLA ÇIKANLAR / GEÇMİŞ -->
  <div class="gecmis-bolum">
    <div class="gecmis-baslik">
      <h3>🛵 Yola Çıkanlar / Teslim Edilenler</h3>
      <div class="tarih-sec">
        <button class="tarih-btn ak" onclick="gecmisTarihSec('bugun',this)">Bugün</button>
        <button class="tarih-btn" onclick="gecmisTarihSec('dun',this)">Dün</button>
        <input type="date" class="tarih-inp" id="gecmis-tarih-inp" onchange="gecmisTarihInputDegisti(this)">
      </div>
    </div>
    <div class="gecmis-grid" id="gecmis-grid"><div class="gecmis-bos">Yükleniyor...</div></div>
  </div>

<script>
const SB_URL = 'KOLAYPIDE_SUPABASE_URL';
const SB_KEY = 'sb_publishable_U2HwJrtzeqkVpmq3JENmMA_3PqE-aOa';
const sb = supabase.createClient(SB_URL, SB_KEY);

let kafeId = null, aktifFiltre = 'hepsi', sesAcik = true;
let siparisler = [], sub = null, garsonCagriler = [], onlineSiparislerMutfak = [], onlineSub = null;
let gecmisTarih = new Date().toISOString().split('T')[0]; // YYYY-MM-DD

// Saat
setInterval(()=>{const e=document.getElementById('saat');if(e)e.textContent=new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});},1000);

function sureFmt(ms){
  const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);
  if(h>0)return h+'s '+(m%60)+'dk';
  if(m>0)return m+'dk '+(s%60)+'sn';
  return s+'sn';
}

function toast(msg){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2800);
}

// Ses context - giriş anında başlatılır
let audioCtx = null;
function sesCtxBaslat() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}

function bildirim(masaAdi, adet, garsonCagri=false){
  const b=document.createElement('div');b.className='bildirim';
  if(garsonCagri){
    b.style.background='#ef4444';
    b.innerHTML='🔔 Garson Çağrısı!<br><span style="font-size:.8rem;font-weight:700;">'+masaAdi+'</span>';
  } else {
    b.innerHTML='🔥 Yeni Sipariş!<br><span style="font-size:.8rem;font-weight:700;">'+masaAdi+' — '+adet+' ürün</span>';
  }
  document.body.appendChild(b);setTimeout(()=>b.remove(),5000);
  if(sesAcik && audioCtx){
    try{
      sesCtxBaslat();
      if(garsonCagri){
        // Garson çağrısı - farklı zil sesi (daha yüksek, dikkat çekici)
        [0, 0.5, 1.0].forEach(gecikme=>{
          [880,1108,880].forEach((f,i)=>{
            const o=audioCtx.createOscillator(),g=audioCtx.createGain();
            o.connect(g);g.connect(audioCtx.destination);o.frequency.value=f;o.type='sine';
            g.gain.setValueAtTime(.5,audioCtx.currentTime+gecikme+i*.12);
            g.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+gecikme+i*.12+.2);
            o.start(audioCtx.currentTime+gecikme+i*.12);o.stop(audioCtx.currentTime+gecikme+i*.12+.2);
          });
        });
      } else {
        // Sipariş sesi
        [523,659,784].forEach((f,i)=>{
          const o=audioCtx.createOscillator(),g=audioCtx.createGain();
          o.connect(g);g.connect(audioCtx.destination);o.frequency.value=f;o.type='sine';
          g.gain.setValueAtTime(.3,audioCtx.currentTime+i*.15);
          g.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+i*.15+.3);
          o.start(audioCtx.currentTime+i*.15);o.stop(audioCtx.currentTime+i*.15+.3);
        });
      }
    }catch(e){ console.log('Ses hatası:',e); }
  }
}

async function mutfakGiris(){
  sesCtxBaslat();
  const kod=document.getElementById('kode').value.trim();
  if(!kod){gosterErr('Restoran kodu girin!');return;}
  // Büyük/küçük harf bağımsız ara
  const{data,error}=await sb.from('kafeler').select('id,kafe_adi,kafe_kodu').ilike('kafe_kodu',kod).single();
  if(error||!data){
    // Hata detayını göster
    gosterErr('Restoran bulunamadı! (Kod: "'+kod+'") — Ayarlar > Kafe Kodu kısmından kontrol edin.');
    console.error('Mutfak giris hatasi:', error);
    return;
  }
  kafeId=data.id;
  localStorage.setItem('mk_id',data.id);
  localStorage.setItem('mk_kod',kod);
  document.getElementById('giris').style.display='none';
  document.getElementById('ana').style.display='block';
  const _mn=document.getElementById('mutfak-nav');if(_mn)_mn.style.display='flex';
  document.getElementById('h-kafe').textContent=data.kafe_adi;
  document.getElementById('gecmis-tarih-inp').value = gecmisTarih;
  await yukle();
  baglan();
}

function gosterErr(m){const e=document.getElementById('err');e.textContent=m;e.style.display='block';}

async function yukle(){
  const{data}=await sb.from('kafeler').select('aktif_masalar, masalar').eq('id',kafeId).single();
  if(!data)return;
  const aktifMasalar=data.aktif_masalar||[];
  const kayitliMasalar=data.masalar||[];
  const yeni=[];
  const yeniCagriler=[];

  aktifMasalar.forEach(masa=>{
    const isDijitalMenu = String(masa.id).startsWith('dm_');
    const kayitliMasa=kayitliMasalar.find(m=>Number(m.id)===Number(masa.id));
    const masaAdi = isDijitalMenu
      ? (masa.ad || '🍽️ Dijital Menü')
      : ((kayitliMasa&&kayitliMasa.ad)?kayitliMasa.ad:(masa.ad||'Masa '+masa.id));

    // Garson çağrısı var mı?
    if(masa.garson_cagri){
      yeniCagriler.push({
        id:'cagri_'+masa.id,
        masaNo:masa.id,
        masaAdi:masaAdi,
        saat:masa.garson_cagri_saat||''
      });
    }

    if(!masa.siparisler||masa.siparisler.length===0)return;
    const mSip=masa.siparisler.filter(s=>s.musteri===true);
    if(mSip.length===0)return;

    // Ürünleri grupla — isim + secimOzeti kombinasyonu (farklı varyantlar ayrı satır)
    const gruplu={};
    mSip.forEach(s=>{
      const ozet=s.secimOzeti||'';
      const k=s.isim+'|||'+ozet;
      if(!gruplu[k])gruplu[k]={isim:s.isim,ikon:s.ikon||'🍽️',adet:0,secimOzeti:ozet,fiyat:s.fiyat||0};
      gruplu[k].adet+=(s.adet||1);
    });

    yeni.push({
      id:'masa_'+masa.id,
      masaNo:masa.id,
      masaAdi:masaAdi,
      urunler:Object.values(gruplu),
      hamSiparisler:mSip,
      durum:masa.mutfak_durum||'bekliyor',
      zaman:masa.mutfak_zaman?new Date(masa.mutfak_zaman).getTime():Date.now()-10000,
      not:masa.not||'',
      garson:masa.garson||''
    });
  });

  // Yeni garson çağrısı geldi mi? Ses çal
  const eskiCagriIdler = garsonCagriler.map(c=>c.id);
  yeniCagriler.filter(c=>!eskiCagriIdler.includes(c.id)).forEach(c=>{
    bildirim('🔔 '+c.masaAdi, 0, true); // true = garson çağrısı
  });
  garsonCagriler = yeniCagriler;

  // Yeni bekleyen geldi mi?
  const eskiBekleyen=siparisler.filter(s=>s.durum==='bekliyor').map(s=>s.id);
  yeni.filter(s=>s.durum==='bekliyor'&&!eskiBekleyen.includes(s.id))
    .forEach(s=>bildirim(s.masaAdi,s.urunler.reduce((t,u)=>t+u.adet,0)));

  siparisler=yeni;
  // Online siparişleri yükle
  await yukleOnline();
  // Geçmiş (yola çıkanlar) güncelle
  await yukleGecmis();
  render();
}

async function yukleOnline() {
  try {
    const { data } = await sb.from('online_siparisler')
      .select('*').eq('kafe_id', kafeId)
      .in('durum', ['bekleniyor','hazirlaniyor'])
      .order('created_at', {ascending:true});
    const eskiBekleyen = onlineSiparislerMutfak.filter(s=>s.durum==='bekleniyor').map(s=>s.id);
    const yeniData = data || [];
    // Yeni gelen online siparişler için bildirim
    yeniData.filter(s=>s.durum==='bekleniyor'&&!eskiBekleyen.includes(s.id))
      .forEach(s => bildirim('🌐 Online #'+s.siparis_no, (s.siparisler||[]).reduce((t,u)=>t+u.adet,0)));
    onlineSiparislerMutfak = yeniData;
  } catch(e) { console.error('Online yükleme hatası:', e); }
}

    aktifFiltre==='bekliyor' ? onlineSiparislerMutfak.filter(s=>s.durum==='bekleniyor') :

    kart.className='kart '+dur;
    kart.innerHTML=`

  } else if(dur==='hazirlaniyor'){

async function garsonCagriKapatMutfak(masaNo){
  const{data}=await sb.from('kafeler').select('aktif_masalar').eq('id',kafeId).single();
  const aktifMasalar=data?.aktif_masalar||[];
  const masa=aktifMasalar.find(m=>Number(m.id)===Number(masaNo));
  if(!masa)return;
  masa.garson_cagri=false;
  masa.garson_cagri_saat=null;
  await sb.from('kafeler').update({aktif_masalar:aktifMasalar}).eq('id',kafeId);
  garsonCagriler=garsonCagriler.filter(c=>Number(c.masaNo)!==Number(masaNo));
  render();
  toast('✓ Gidildi — çağrı kapatıldı');
}

async function durumGuncelle(masaNo,yeniDurum){
  const{data}=await sb.from('kafeler').select('aktif_masalar').eq('id',kafeId).single();
  const aktifMasalar=data?.aktif_masalar||[];
  const masa=aktifMasalar.find(m=>Number(m.id)===Number(masaNo)||String(m.id)===String(masaNo));
  if(!masa)return;
  if(yeniDurum==='iptal'){
    masa.siparisler=(masa.siparisler||[]).filter(s=>!s.musteri);
    masa.mutfak_durum=null;masa.mutfak_zaman=null;
    toast('❌ Sipariş iptal edildi');
  }else{
    masa.mutfak_durum=yeniDurum;
    toast(yeniDurum==='hazirlaniyor'?'👨‍🍳 Hazırlanıyor!':'✅ Hazır — Garson bilgilendirildi!');
  }
  await sb.from('kafeler').update({aktif_masalar:aktifMasalar}).eq('id',kafeId);
  await yukle();
}

async function teslim(masaNo){
  const{data}=await sb.from('kafeler').select('aktif_masalar,masalar').eq('id',kafeId).single();
  const aktifMasalar=data?.aktif_masalar||[];
  const kayitliMasalar=data?.masalar||[];
  const masa=aktifMasalar.find(m=>Number(m.id)===Number(masaNo)||String(m.id)===String(masaNo));
  if(!masa)return;
  const isDijitalMenu = String(masaNo).startsWith('dm_');

  if(isDijitalMenu){
    const idx = aktifMasalar.findIndex(m=>String(m.id)===String(masaNo));
    if(idx>-1) aktifMasalar.splice(idx,1);
  } else {
    // kolaypidenlar tablosuna yaz — mutfak teslim kaydı
    try {
      const mutfakSiparisler = (masa.siparisler||[]).filter(s=>s.musteri===true);
      if(mutfakSiparisler.length > 0){
        const toplam = mutfakSiparisler.reduce((t,s)=>t+(s.fiyat||0)*(s.adet||1),0);
        const kayitliMasa = kayitliMasalar.find(m=>Number(m.id)===Number(masaNo));
        const masaAdi = kayitliMasa?.ad || masa.ad || 'Masa '+masaNo;
        await sb.from('kolaypidenlar').insert({
          kafe_id: kafeId,
          masa_no: Number(masaNo)||0,
          masa_ad: masaAdi,
          toplam: toplam,
          garson: masa.garson||'',
          masa_notu: masa.not||null,
          siparisler: mutfakSiparisler,
          odeme_tipi: 'mutfak-teslim',
        });
      }
    } catch(e){ console.error('Teslim kayıt hatası:',e); }

    // Siparişleri teslim edildi olarak işaretle
    masa.siparisler=(masa.siparisler||[]).map(s=>s.musteri?{...s,musteri:false,mutfak_teslim:true}:s);
    masa.mutfak_durum=null; masa.mutfak_zaman=null;
  }

  await sb.from('kafeler').update({aktif_masalar:aktifMasalar}).eq('id',kafeId);
  toast(isDijitalMenu?'🏁 Dijital menü siparişi teslim edildi':'🏁 Teslim edildi!');
  await yukle();
}

function filtrele(f,btn){

function sesToggle(){
  sesCtxBaslat();
  sesAcik=!sesAcik;
  const b=document.getElementById('ses-btn');
  b.textContent=sesAcik?'🔔 Ses':'🔕 Ses';
  b.classList.toggle('on',sesAcik);
  // Ses açıldıysa test sesi çal
  if(sesAcik && audioCtx){
    try{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.connect(g);g.connect(audioCtx.destination);
      o.frequency.value=880;o.type='sine';
      g.gain.setValueAtTime(.2,audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+.3);
      o.start(audioCtx.currentTime);o.stop(audioCtx.currentTime+.3);
    }catch(e){}
  }
}

async function onlineDurumGuncelleMutfak(id, durum) {
  await sb.from('online_siparisler').update({durum}).eq('id', id);
  
  // Teslim edilince kolaypidenlar tablosuna da yaz (raporlama için)
  if (durum === 'teslim' || durum === 'yolda') {
    try {
      const siparis = onlineSiparislerMutfak.find(s => s.id === id);
      if (siparis && durum === 'yolda') {
        await sb.from('kolaypidenlar').insert({
          kafe_id: kafeId,
          masa_no: 0,
          masa_ad: '🌐 Online #' + siparis.siparis_no,
          toplam: siparis.toplam || 0,
          garson: '🌐 Online',
          odeme_tipi: siparis.odeme_tipi || 'online',
          siparisler: siparis.siparisler || [],
          musteri_adi: siparis.musteri_ad || ''
        });
      }
    } catch(e) { console.error('Kolaycafen yazma hatası:', e); }
  }
  
  await yukleOnline();
  render();
}

function gecmisTarihSec(tip, btn) {
  document.querySelectorAll('.tarih-btn').forEach(b=>b.classList.remove('ak'));
  btn.classList.add('ak');
  const bugun = new Date();
  if (tip === 'bugun') {
    gecmisTarih = bugun.toISOString().split('T')[0];
  } else if (tip === 'dun') {
    const dun = new Date(bugun); dun.setDate(dun.getDate()-1);
    gecmisTarih = dun.toISOString().split('T')[0];
  }
  document.getElementById('gecmis-tarih-inp').value = gecmisTarih;
  yukleGecmis();
}

function gecmisTarihInputDegisti(inp) {
  gecmisTarih = inp.value;
  document.querySelectorAll('.tarih-btn').forEach(b=>b.classList.remove('ak'));
  yukleGecmis();
}

async function yukleGecmis() {
  const grid = document.getElementById('gecmis-grid');
  grid.innerHTML = '<div class="gecmis-bos">Yükleniyor...</div>';
  
  try {
    // Seçilen günün başı ve sonu
    const baslangic = gecmisTarih + 'T00:00:00.000Z';
    const bitis = gecmisTarih + 'T23:59:59.999Z';
    
    // Türkiye UTC+3, buna göre düzelt
    const tarihObj = new Date(gecmisTarih);
    const tzOffset = 3 * 60 * 60 * 1000; // UTC+3
    const gunBaslangic = new Date(tarihObj.getTime() - tzOffset).toISOString();
    const gunBitis = new Date(tarihObj.getTime() - tzOffset + 24*60*60*1000 - 1).toISOString();

    // Teslim/yolda online siparişler
    const { data: onlineData } = await sb.from('online_siparisler')
      .select('*').eq('kafe_id', kafeId)
      .in('durum', ['yolda','teslim'])
      .gte('created_at', gunBaslangic)
      .lte('created_at', gunBitis)
      .order('created_at', {ascending: false});

    // Kolaycafenlar (masa siparişleri) - sadece bugünkü
    const { data: masaData } = await sb.from('kolaypidenlar')
      .select('*').eq('kafe_id', kafeId)
      .neq('odeme_tipi', 'cari_tahsil')
      .gte('created_at', gunBaslangic)
      .lte('created_at', gunBitis)
      .order('created_at', {ascending: false});

    const kayitlar = [];
    
    // Online siparişleri ekle
    (onlineData || []).forEach(s => {
      kayitlar.push({
        tip: 'online',
        baslik: '🌐 Online #' + s.siparis_no,
        alttBaslik: s.musteri_ad + ' · ' + s.musteri_tel,
        adres: s.adres || '',
        urunler: s.siparisler || [],
        toplam: s.toplam || 0,
        saat: new Date(s.created_at).toLocaleTimeString('tr-TR', {hour:'2-digit',minute:'2-digit'}),
        durum: s.durum
      });
    });
    
    // Masa siparişlerini ekle
    (masaData || []).forEach(a => {
      kayitlar.push({
        tip: 'masa',
        baslik: a.masa_ad || 'Masa ' + a.masa_no,
        alttBaslik: (a.garson ? '👤 ' + a.garson : '') + (a.musteri_adi ? ' · ' + a.musteri_adi : ''),
        urunler: a.siparisler || [],
        toplam: a.toplam || 0,
        saat: new Date(a.created_at).toLocaleTimeString('tr-TR', {hour:'2-digit',minute:'2-digit'}),
        odeme: a.odeme_tipi || 'nakit'
      });
    });

    if (kayitlar.length === 0) {
      const tarihGoster = new Date(gecmisTarih + 'T12:00:00').toLocaleDateString('tr-TR', {day:'numeric',month:'long'});
      grid.innerHTML = `<div class="gecmis-bos">📭 ${tarihGoster} tarihinde kayıt bulunamadı</div>`;
      return;
    }

    grid.innerHTML = kayitlar.map(k => {
      const urunStr = k.urunler.slice(0,4).map(u => u.isim + ' x' + (u.adet||1)).join(', ') + (k.urunler.length>4?'...':'');
      const durumBadge = k.tip==='online' ? `<span style="font-size:.65rem;background:#22c55e22;color:var(--green);padding:2px 7px;border-radius:8px;font-weight:900;">${k.durum==='yolda'?'🛵 Yolda':'✅ Teslim'}</span>` : `<span style="font-size:.65rem;background:#3b82f622;color:#3b82f6;padding:2px 7px;border-radius:8px;font-weight:900;">💳 ${k.odeme||'nakit'}</span>`;
      return `<div class="gecmis-kart">
        <div class="gecmis-kart-baslik">
          <div>
            <div class="gecmis-masa">${k.baslik}</div>
            <div class="gecmis-saat">${k.saat}${k.alttBaslik?' · '+k.alttBaslik:''}</div>
          </div>
          ${durumBadge}
        </div>
        ${k.adres ? `<div style="font-size:.72rem;color:var(--muted);margin-bottom:5px;">📍 ${k.adres}</div>` : ''}
        <div class="gecmis-urun">${urunStr || '—'}</div>
        <div class="gecmis-toplam">${k.toplam.toLocaleString('tr-TR')} ₺</div>
      </div>`;
    }).join('');

  } catch(e) {
    console.error('Geçmiş yükleme hatası:', e);
    grid.innerHTML = '<div class="gecmis-bos">⚠️ Yüklenirken hata oluştu</div>';
  }
}

function baglan(){
  if(sub) sub.unsubscribe();
  // Online siparişler realtime
  if(onlineSub) onlineSub.unsubscribe();
  onlineSub = sb.channel('mutfak-online-'+kafeId)
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'online_siparisler'
    }, async (payload) => {
      if (payload.new?.kafe_id !== kafeId) return;
      await yukleOnline();
      render();
    })
    .on('postgres_changes', {
      event: 'UPDATE', schema: 'public', table: 'online_siparisler'
    }, async (payload) => {
      if (payload.new?.kafe_id !== kafeId) return;
      await yukleOnline();
      render();
    })
    .subscribe();
  
  sub = sb.channel('mutfak-'+kafeId)
    .on('postgres_changes', {
      event: 'UPDATE',
      schema: 'public',
      table: 'kafeler',
      filter: 'id=eq.'+kafeId
    }, async () => {
      await yukle();
    })
    .subscribe((status) => {
      console.log('Mutfak realtime:', status);
      // Bağlantı kopunca 3sn sonra yeniden bağlan
      if (status === 'CLOSED' || status === 'CHANNEL_ERROR') {
        setTimeout(() => baglan(), 3000);
      }
    });

  // Yedek polling - her 5 saniyede bir yükle (realtime çalışmasa bile)
  if (window._mutfakInterval) clearInterval(window._mutfakInterval);
  window._mutfakInterval = setInterval(async () => {
    await yukle();
  }, 5000);
}
